# .github/workflows/e2e-dummy-target.yml — throwaway dummy-target E2E suite (issue #797 [#785-S10])
#
# Runs the composed end-to-end acceptance suite (tests/plugin/verify-e2e-dummy-target.sh),
# which provisions a structurally-real, zero-submodule dummy library target, installs the
# AutoFlow tool into it via setup/init.sh, and drives the already-unit-covered mechanisms
# (install, manifest, drift, host-purity, single-repo HANDOFF gate + create-host-pr.sh label
# runtime) end-to-end AS A COMPOSITION — the PILOT gate before claude-autoflow itself becomes
# the first reversal case (S11a #798). The suite COMPOSES; it delegates the unit-level
# assertions to verify-install-into-target.sh / verify-package.sh / test-issue-788-host-purity-delta.sh
# as whole-suite regressions and adds only the composition-only arms.
#
# Why GitHub Actions: the suite is pure POSIX sh + jq/cmp/diff/grep/awk/git with no node/npm,
# no bats, and no submodule checkout — the same zero-infra rationale as plugin-package.yml /
# host-purity-delta.yml / schema-hook-contract.yml. ubuntu-latest ships bash 5.x + git + jq;
# the delegated regression suites walk the merge-base against origin/main, so checkout uses
# fetch-depth: 0.
#
# One file per subject: this is a DEDICATED sibling workflow (not a job added to
# plugin-package.yml), matching the four existing advisory workflows' one-file-per-subject
# convention and keeping the E2E's path-filter independent of the packaging suite's.
#
# Enforcement level: ADVISORY. This repo's plan provides no branch-protection /
# required-status-checks, so a red run here does NOT auto-block merge; it surfaces a
# pass/fail signal the external reviewer confirms green before merging.

